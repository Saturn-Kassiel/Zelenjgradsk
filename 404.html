<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Страница не найдена — Апартаменты в Зеленоградске</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Saturn-Kassiel/Zelenjgradsk/main/img/city/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #3E7057;
  --charcoal: #2E384D;
  --muted: #5A84A1;
  --bg: #F4F6FB;
  --mint: #B8F5D2;
  --aqua: #BFEDF2;
  --sky: #D0E8FF;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--charcoal);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 80% 50% at 10% 20%, rgba(184,245,210,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 90% 80%, rgba(208,232,255,0.30) 0%, transparent 60%),
    var(--bg);
}
.container {
  text-align: center;
  max-width: 480px;
}
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 48px;
  text-decoration: none;
}
.logo img {
  width: 40px;
  height: 40px;
  object-fit: contain;
}
.logo-text {
  font-family: 'Manrope', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--teal);
}
.cat-icon {
  font-size: 80px;
  margin-bottom: 24px;
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.code {
  font-family: 'Manrope', sans-serif;
  font-size: 96px;
  font-weight: 800;
  color: var(--charcoal);
  letter-spacing: -4px;
  line-height: 1;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--teal), #5269AB);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
h1 {
  font-family: 'Manrope', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--charcoal);
  margin-bottom: 12px;
}
p {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 36px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--teal);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 14px 28px;
  border-radius: 50px;
  text-decoration: none;
  transition: all 0.25s;
}
.btn:hover {
  background: #325f47;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(62,112,87,0.3);
}
</style>
</head>
<body>
  <div class="container">
    <a href="https://aparts-baltika.ru" class="logo">
      <img src="https://raw.githubusercontent.com/Saturn-Kassiel/Zelenjgradsk/main/img/city/logo.png" alt="Логотип">
      <span class="logo-text">Апартаменты в Зеленоградске</span>
    </a>
    <div class="cat-icon">
      <img src="https://raw.githubusercontent.com/Saturn-Kassiel/Zelenjgradsk/main/img/city/logo.png" style="width:80px;height:80px;object-fit:contain">
    </div>
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Кажется, этой страницы не существует. Возможно, ссылка устарела или была удалена. Кот тоже не знает куда она делась.</p>
    <a href="https://aparts-baltika.ru" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      На главную
    </a>
  </div>
</body>
</html>
